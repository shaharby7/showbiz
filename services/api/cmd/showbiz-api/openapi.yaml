openapi: 3.0.3
info:
  title: Showbiz API
  description: Showbiz platform API service.
  version: 0.1.0
servers:
  - url: http://localhost:8080

tags:
  - name: Health
  - name: Auth
  - name: Providers
  - name: Organizations
  - name: Members
  - name: Projects
  - name: Connections
  - name: Resources
  - name: Resource Types
  - name: IAM Policies
  - name: IAM Attachments

paths:
  # ── Health ──────────────────────────────────────────────────────────
  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  # ── Auth ────────────────────────────────────────────────────────────
  /v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                displayName:
                  type: string
                organizationId:
                  type: string
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Providers ───────────────────────────────────────────────────────
  /v1/providers:
    get:
      operationId: listProviders
      tags: [Providers]
      summary: List available providers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/providers/{id}:
    get:
      operationId: getProvider
      tags: [Providers]
      summary: Get a provider by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/providerId"
      responses:
        "200":
          description: Provider details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Organizations ───────────────────────────────────────────────────
  /v1/organizations:
    post:
      operationId: createOrganization
      tags: [Organizations]
      summary: Create an organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                displayName:
                  type: string
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listOrganizations
      tags: [Organizations]
      summary: List organizations
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{id}:
    get:
      operationId: getOrganization
      tags: [Organizations]
      summary: Get an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOrganization
      tags: [Organizations]
      summary: Update an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName:
                  type: string
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{id}/deactivate:
    post:
      operationId: deactivateOrganization
      tags: [Organizations]
      summary: Deactivate an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "204":
          description: Organization deactivated
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{id}/activate:
    post:
      operationId: activateOrganization
      tags: [Organizations]
      summary: Activate an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "204":
          description: Organization activated
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Members ─────────────────────────────────────────────────────────
  /v1/organizations/{id}/members:
    get:
      operationId: listMembers
      tags: [Members]
      summary: List organization members
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addMember
      tags: [Members]
      summary: Add a member to an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Member added
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{id}/members/{email}:
    delete:
      operationId: removeMember
      tags: [Members]
      summary: Remove a member from an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
      responses:
        "204":
          description: Member removed
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization or member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Projects ────────────────────────────────────────────────────────
  /v1/organizations/{orgId}/projects:
    post:
      operationId: createProject
      tags: [Projects]
      summary: Create a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listProjects
      tags: [Projects]
      summary: List projects in an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{orgId}/projects/{projectId}:
    get:
      operationId: getProject
      tags: [Projects]
      summary: Get a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [Projects]
      summary: Update a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [Projects]
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/projectId"
      responses:
        "204":
          description: Project deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Connections ─────────────────────────────────────────────────────
  /v1/projects/{projectId}/connections:
    post:
      operationId: createConnection
      tags: [Connections]
      summary: Create a connection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, provider, credentials]
              properties:
                name:
                  type: string
                provider:
                  type: string
                credentials:
                  type: object
                config:
                  type: object
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listConnections
      tags: [Connections]
      summary: List connections in a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of connections
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Connection"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{projectId}/connections/{connectionId}:
    get:
      operationId: getConnection
      tags: [Connections]
      summary: Get a connection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "200":
          description: Connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateConnection
      tags: [Connections]
      summary: Update a connection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/connectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: object
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConnection
      tags: [Connections]
      summary: Delete a connection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/connectionId"
      responses:
        "204":
          description: Connection deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Connection still in use by resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Resources ───────────────────────────────────────────────────────
  /v1/projects/{projectId}/resources:
    post:
      operationId: createResource
      tags: [Resources]
      summary: Create a resource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, resourceType]
              properties:
                name:
                  type: string
                connectionId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Required for provider-backed resource types, null for Showbiz-managed types
                resourceType:
                  type: string
                values:
                  type: object
      responses:
        "201":
          description: Resource created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listResources
      tags: [Resources]
      summary: List resources in a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of resources
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedList"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Resource"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/{projectId}/resources/{resourceId}:
    get:
      operationId: getResource
      tags: [Resources]
      summary: Get a resource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Resource details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateResource
      tags: [Resources]
      summary: Update a resource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [values]
              properties:
                values:
                  type: object
      responses:
        "200":
          description: Resource updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteResource
      tags: [Resources]
      summary: Delete a resource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Resource deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Resource Types ────────────────────────────────────────────────────
  /v1/resource-types:
    get:
      operationId: listResourceTypes
      tags: [Resource Types]
      summary: List all registered resource types
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of resource types with schemas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceTypeInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/resource-types/{name}:
    get:
      operationId: getResourceType
      tags: [Resource Types]
      summary: Get a resource type by name
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource type details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceTypeInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource type not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── IAM Policies ────────────────────────────────────────────────────
  /v1/iam/policies:
    get:
      operationId: listAllPolicies
      tags: [IAM Policies]
      summary: List all policies (global + organization)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/iam/policies/{policyId}:
    get:
      operationId: getPolicy
      tags: [IAM Policies]
      summary: Get a policy by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/policyId"
      responses:
        "200":
          description: Policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{orgId}/policies:
    get:
      operationId: listOrganizationPolicies
      tags: [IAM Policies]
      summary: List policies for an organization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
      responses:
        "200":
          description: List of organization policies
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrganizationPolicy
      tags: [IAM Policies]
      summary: Create an organization policy
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/organizations/{orgId}/policies/{policyId}:
    delete:
      operationId: deleteOrganizationPolicy
      tags: [IAM Policies]
      summary: Delete an organization policy
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/policyId"
      responses:
        "204":
          description: Policy deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Cannot delete global policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── IAM Attachments ─────────────────────────────────────────────────
  /v1/organizations/{orgId}/projects/{projectId}/attachments:
    get:
      operationId: listAttachments
      tags: [IAM Attachments]
      summary: List policy attachments for a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: List of policy attachments
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicyAttachment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAttachment
      tags: [IAM Attachments]
      summary: Attach a policy to a user in a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, policyId]
              properties:
                userEmail:
                  type: string
                  format: email
                policyId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Policy attachment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyAttachment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAttachment
      tags: [IAM Attachments]
      summary: Remove a policy attachment from a user in a project
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/orgId"
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, policyId]
              properties:
                userEmail:
                  type: string
                  format: email
                policyId:
                  type: string
                  format: uuid
      responses:
        "204":
          description: Policy attachment removed
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  # ── Security Schemes ────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable Parameters ─────────────────────────────────────────────
  parameters:
    providerId:
      name: id
      in: path
      required: true
      schema:
        type: string
    organizationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    orgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    connectionId:
      name: connectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    resourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: string
    policyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Pagination cursor returned by a previous request.
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of items to return.

  # ── Schemas ─────────────────────────────────────────────────────────
  schemas:
    User:
      type: object
      properties:
        email:
          type: string
          format: email
        organizationId:
          type: string
        displayName:
          type: string
        emailVerified:
          type: boolean
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        organizationId:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Connection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        projectId:
          type: string
          format: uuid
        provider:
          type: string
        config:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      description: Credentials are write-only and never returned in responses.

    Resource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projectId:
          type: string
          format: uuid
        connectionId:
          type: string
          format: uuid
          nullable: true
        resourceType:
          type: string
        values:
          type: object
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResourceTypeInfo:
      type: object
      properties:
        name:
          type: string
        requiresConnection:
          type: boolean
        inputSchema:
          type: array
          items:
            $ref: "#/components/schemas/FieldSchema"
        outputSchema:
          type: array
          items:
            $ref: "#/components/schemas/FieldSchema"

    FieldSchema:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        required:
          type: boolean
        description:
          type: string

    Provider:
      type: object
      properties:
        name:
          type: string
        resourceTypes:
          type: array
          items:
            type: string

    Policy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scope:
          type: string
          enum: [global, organization]
        organizationId:
          type: string
          format: uuid
          nullable: true
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PolicyAttachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        userEmail:
          type: string
          format: email
        policyId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    PaginatedList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: {}
        pagination:
          type: object
          required: [nextCursor, hasMore]
          properties:
            nextCursor:
              type: string
              nullable: true
            hasMore:
              type: boolean
