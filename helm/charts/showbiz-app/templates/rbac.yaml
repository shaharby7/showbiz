{{- if .Values.rbac }}
{{- if .Values.rbac.clusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "showbiz-app.fullname" . }}
  labels:
    {{- include "showbiz-app.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.clusterRole.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "showbiz-app.fullname" . }}
  labels:
    {{- include "showbiz-app.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "showbiz-app.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "showbiz-app.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
