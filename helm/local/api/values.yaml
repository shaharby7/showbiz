image:
  repository: showbiz-api
  tag: local
  pullPolicy: Never  # Use locally built image

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: api.showbiz.local
      paths:
        - path: /
          pathType: Prefix

env:
  - name: SHOWBIZ_DB_HOST
    value: mysql.showbiz.svc.cluster.local
  - name: SHOWBIZ_DB_PORT
    value: "3306"
  - name: SHOWBIZ_DB_USER
    value: showbiz
  - name: SHOWBIZ_DB_PASSWORD
    value: showbiz_dev
  - name: SHOWBIZ_DB_NAME
    value: showbiz
  - name: SHOWBIZ_JWT_SECRET
    value: dev-secret-do-not-use-in-production
  - name: SHOWBIZ_API_PORT
    value: "8080"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
